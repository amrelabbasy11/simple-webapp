name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    # Job-1: Testing & Qulaity
    Testing:
        runs-on: ubuntu-latest

        steps:
          - name: checkout code
            uses: actions/checkout@v5

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.10"

          - name: Install dependencies
            run: | 
              pip install -r requirements.txt
              pip install pytest flake8 coverege

          - name: Auto format 
            run: pip install black && black
          
          - name: Run Flake8
            run: flake8 . 

          - name: Run Pytest
            run: pytest -v
            env:
                PYTHONPATH: .

         
