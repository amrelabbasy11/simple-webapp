name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
         host: ${{ secrets.EC2_HOST }}
         username: ubuntu
         key: ${{ secrets.EC2_KEY }}
         script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

          docker stop flask-app || true
          docker rm flask-app || true

          docker run -d \
          --name flask-app \
          -p 8080:8080 \
          ${{ secrets.DOCKER_USERNAME }}/flask-app:latest
