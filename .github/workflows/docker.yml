name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Job 1: Build & Push (Cloud Runner)
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest


  # Job 2: Deploy (Self-Hosted Runner)
  deploy:
    runs-on: self-hosted
    needs: build 

    steps:
      - name: Pull Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Stop Old Container
        run: |
          docker stop flask-app || true
          docker rm flask-app || true

      - name: Run New Container
        run: |
          docker run -d \
            --name flask-app \
            -p 8080:8080 \
            ${{ secrets.DOCKER_USERNAME }}/flask-app:latest