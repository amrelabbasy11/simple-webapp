name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
 # Job 1: Testing
  Testing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 coverage

      # Like checkstyle in java
      - name: Auto format
        run: pip install black && black .
        
      - name: Run Flake8 (Code Style)
        run: flake8 .

      - name: Run Pytest
        run: pytest -v
        env:
         PYTHONPATH: .

      - name: Generate Coverage
        run: coverage run -m pytest

      - name: Export Coverage XML
        run: coverage xml

 # Job 2: Build
  build:
    runs-on: ubuntu-latest
    needs: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest